<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Confession</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffb6c1,#ffd6e7,#ffeaf4);
overflow:hidden;
font-family:'Playfair Display',serif;
}


/* countdown text */
#countdown{
font-size:120px;
color:#ff2e6e;
text-shadow:
0 0 10px pink,
0 0 20px #ff4da6,
0 0 40px #ff80bf;
}
  /* final text */

#loveText{
position:absolute;
font-size:60px;
color:#ff4da6;
font-style:italic;
text-shadow:
0 0 10px pink,
0 0 20px #ff4da6,
0 0 40px #ff66cc,
0 0 60px #ff99dd;
opacity:0;
transform:scale(0.8);
transition:2s;
z-index:5;
}

#loveText.show{
opacity:1;
transform:scale(1.2);
animation:pulse 2s infinite alternate;
}

@keyframes pulse{
from{transform:scale(1.15);}
to{transform:scale(1.25);}
}
  
.bg-heart{
position:fixed;
bottom:-60px;
color:#ff4da6;
font-size:22px;
opacity:0.7;
pointer-events:none;
z-index:0;
animation:floatHeart linear forwards;
text-shadow:0 0 10px pink,0 0 20px #ff66cc;
}

@keyframes floatHeart{
0%{
transform:translateY(0) scale(0.6);
opacity:0;
}
50%{
opacity:1;
}
100%{
transform:translateY(-110vh) scale(1.5);
opacity:0;
}
}
</style>

</head>

<body>

<div id="countdown">3</div>

<div id="loveText">
<i>I LOVE YOU SAKSHI</i>
</div>

<audio id="loveAudio">
<source src="iloveyou.mp3" type="audio/mpeg">
</audio>

<script>

let count=3;
const counter=document.getElementById("countdown");
const love=document.getElementById("loveText");
const audio=document.getElementById("loveAudio");

const timer=setInterval(()=>{

count--;

if(count>0){
counter.innerHTML=count;
}

else{

clearInterval(timer);

counter.style.display="none";

love.classList.add("show");

audio.volume = 1;
audio.play().catch(()=>{});

const heartInterval = setInterval(createBgHeart,400);

}

},1000);

  function createBgHeart(){

const heart=document.createElement("div");
heart.classList.add("bg-heart");
heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(16+Math.random()*30)+"px";
heart.style.animationDuration=(6+Math.random()*5)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},11000);

  }

</script>
  

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Confession for Sakshi</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,600&display=swap" rel="stylesheet">
  
  <style>
    /* Prevent all scrolling and fix layout to viewport */
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden; /* Strictly no scroll */
      position: fixed; /* Lock screen in place */
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle, #ffeaf4 0%, #ffb6c1 100%);
      font-family: 'Playfair Display', serif;
    }

    /* Countdown Styling */
    #countdown {
      font-size: 140px;
      color: #ff2e6e;
      text-shadow: 0 0 20px rgba(255, 46, 110, 0.4);
      font-weight: 600;
      z-index: 100;
      transition: opacity 0.5s ease;
    }

    /* Central Heart Container */
    #finalHeartContainer {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
      z-index: 50;
      pointer-events: none;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #finalHeartContainer.show {
      animation: zoomAndGlow 2.5s cubic-bezier(0.17, 0.89, 0.32, 1.49) forwards;
      pointer-events: auto;
    }

    /* Glass Heart */
    .glass-heart {
      position: relative;
      width: 160px;
      height: 160px;
      background: #ff1a8c;
      transform: rotate(-45deg);
      box-shadow: 0 0 50px #ff4da6, inset 0 0 30px rgba(255, 255, 255, 0.4);
    }

    .glass-heart:before, .glass-heart:after {
      content: "";
      position: absolute;
      width: 160px;
      height: 160px;
      background: #ff1a8c;
      border-radius: 50%;
      box-shadow: inset 0 0 30px rgba(255, 255, 255, 0.4);
    }
    .glass-heart:before { top: -80px; left: 0; }
    .glass-heart:after { left: 80px; top: 0; }

    .heart-shine {
      position: absolute;
      top: -35px;
      left: 25px;
      width: 70px;
      height: 35px;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      transform: rotate(15deg);
      filter: blur(6px);
      z-index: 52;
    }

    /* Heart Ripples */
    .ripple {
      position: absolute;
      width: 160px;
      height: 160px;
      background: transparent;
      border: 2px solid #ff1a8c;
      transform: rotate(-45deg) scale(1);
      opacity: 0;
      pointer-events: none;
    }
    .ripple:before, .ripple:after {
      content: "";
      position: absolute;
      width: 160px;
      height: 160px;
      border: 2px solid #ff1a8c;
      border-radius: 50%;
    }
    .ripple:before { top: -82px; left: -2px; }
    .ripple:after { left: 80px; top: -2px; }

    .show .ripple {
      animation: heartRipple 3s infinite;
    }
    .ripple:nth-child(2) { animation-delay: 1.5s; }

    @keyframes heartRipple {
      0% { transform: rotate(-45deg) scale(1); opacity: 0.6; }
      100% { transform: rotate(-45deg) scale(3.5); opacity: 0; }
    }

    @keyframes zoomAndGlow {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      40% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; animation: glowPulse 2s infinite alternate; }
    }

    @keyframes glowPulse {
      from { filter: drop-shadow(0 0 20px #ff1a8c) drop-shadow(0 0 40px #ff4da6); }
      to { filter: drop-shadow(0 0 40px #ff1a8c) drop-shadow(0 0 80px #ff4da6); }
    }

    /* Confession Button - Fixed at bottom */
    #confessBtn {
      position: fixed;
      bottom: 5vh; /* Responsive distance from bottom */
      left: 50%;
      transform: translateX(-50%) translateY(50px);
      padding: 16px 45px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      background: #ff4da6;
      color: white;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(255, 77, 166, 0.4);
      opacity: 0;
      transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 110;
      white-space: nowrap;
    }
    
    #confessBtn.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Love Text */
    #loveText {
      position: absolute;
      z-index: 60;
      color: white;
      font-size: 45px;
      font-weight: 600;
      text-align: center;
      width: 100vw;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
      pointer-events: none;
    }

    /* Small Background Floating Hearts */
    .heart {
      position: absolute;
      bottom: -10vh;
      pointer-events: none;
      animation: floatUp linear forwards;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg); opacity: 0; }
      20% { opacity: 0.7; }
      100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
    }

    /* Mobile adjustments */
    @media(max-width: 600px) {
      #countdown { font-size: 100px; }
      #loveText { font-size: 30px; width: 90%; }
      .glass-heart, .glass-heart:before, .glass-heart:after, .ripple, .ripple:before, .ripple:after {
        width: 110px; height: 110px;
      }
      .glass-heart:before, .ripple:before { top: -55px; }
      .glass-heart:after, .ripple:after { left: 55px; }
    }
  </style>
</head>
<body>

  <div id="countdown">3</div>
  
  <div id="finalHeartContainer">
    <div class="ripple"></div>
    <div class="ripple"></div>
    <div class="glass-heart">
      <div class="heart-shine"></div>
    </div>
  </div>
  
  <div id="loveText"></div>
  
  <audio id="loveAudio"><source src="I LOVE YOU.mp3" type="audio/mpeg"></audio>
  <button id="confessBtn">Love Confession ❤️</button>

  <script>
    let count = 3;
    const counter = document.getElementById("countdown");
    const loveText = document.getElementById("loveText");
    const finalHeart = document.getElementById("finalHeartContainer");
    const btn = document.getElementById("confessBtn");
    const audio = document.getElementById("loveAudio");

    const timer = setInterval(() => {
      count--;
      if (count > 0) {
        counter.innerHTML = count;
      } else {
        clearInterval(timer);
        setTimeout(() => {
          counter.style.opacity = "0";
          setTimeout(() => {
            counter.style.display = "none";
            startAnimation();
          }, 500);
        }, 1000);
      }
    }, 1000);

    function startAnimation() {
      finalHeart.classList.add("show");
      setInterval(createHeart, 700);
      
      // Delay typing until zoom finishes
      setTimeout(() => {
        typeWriter("I Love You Sakshi", 0);
      }, 1500);
    }

    function typeWriter(text, i) {
      if (i < text.length) {
        loveText.innerHTML += `<i>${text.charAt(i)}</i>`;
        setTimeout(() => typeWriter(text, i + 1), 120);
      } else {
        // Show button only after text is finished
        btn.classList.add("show");
      }
    }

    function createHeart() {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "❤";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = (15 + Math.random() * 15) + "px";
      heart.style.color = ['#ff4da6', '#ff1a8c', '#ff80bf'][Math.floor(Math.random()*3)];
      heart.style.animationDuration = (6 + Math.random() * 4) + "s";
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 10000);
    }

    btn.addEventListener("click", () => {
      audio.currentTime = 0;
      audio.play();
    });
  </script>
</body>
</html>
